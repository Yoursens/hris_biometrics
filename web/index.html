<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HRIS Biometrics</title>
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- CanvasKit & Plugins -->
  <script src="https://unpkg.com/canvaskit-wasm@0.39.1/bin/canvaskit.js"></script>

  <style>
    body { background-color: #0A0F2E; margin: 0; }
    #loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; color: white; font-family: sans-serif;
    }
  </style>
</head>
<body>
  <div id="loading">Initializing HRIS Engine...</div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('load', function(ev) {
      // Modern Flutter Web Loader
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: "1.0",
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
