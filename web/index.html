<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HRIS Biometrics</title>
  <meta name="description" content="HRIS Biometrics - Enterprise Attendance Platform">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0A0F2E;
      font-family: sans-serif;
    }
    #loading-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 16px;
    }
    .loading-logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #00D4FF, #0055BB);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      animation: pulse 2s ease-in-out infinite;
    }
    .loading-title {
      font-size: 20px;
      font-weight: 800;
      color: #FFFFFF;
      letter-spacing: 2px;
    }
    .loading-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
    }
    .loading-bar {
      width: 160px;
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }
    .loading-bar-inner {
      height: 100%;
      background: #00D4FF;
      border-radius: 2px;
      animation: load 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(0.95); }
      50% { transform: scale(1.05); }
    }
    @keyframes load {
      0% { width: 0%; margin-left: 0%; }
      50% { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }
  </style>
</head>
<body>

<div id="loading-indicator">
  <div class="loading-logo">👆</div>
  <div class="loading-title">HRIS BIOMETRICS</div>
  <div class="loading-sub">Initializing...</div>
  <div class="loading-bar">
    <div class="loading-bar-inner"></div>
  </div>
</div>

<script src="flutter_bootstrap.js" async></script>

</body>
</html>
