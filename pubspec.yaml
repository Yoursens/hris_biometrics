name: hris_biometrics
description: A next-gen HRIS Biometrics application with smart innovation.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Animation
  cupertino_icons: ^1.0.6
  flutter_animate: ^4.3.0
  lottie: ^2.7.0
  shimmer: ^3.0.0
  fl_chart: ^0.65.0
  
  # Local DB
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  
  # Biometrics & AI
  local_auth: ^2.1.8
  google_mlkit_face_detection: ^0.11.0
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  
  # Camera & Image
  camera: ^0.10.5+5
  image_picker: ^1.0.7
  image: ^4.1.3
  
  # HTTP & Networking
  http: ^1.1.0
  dio: ^5.4.0
  
  # State Management
  provider: ^6.1.1
  
  # Utils
  intl: ^0.18.1
  uuid: ^4.2.2
  qr_flutter: ^4.1.0
  permission_handler: ^11.1.0
  geolocator: ^10.1.0
  device_info_plus: ^9.1.1
  connectivity_plus: ^5.0.2
  nfc_manager: ^4.1.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
