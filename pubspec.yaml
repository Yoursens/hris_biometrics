name: hris_biometrics
description: A next-gen HRIS Biometrics application with smart innovation.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.2

  # UI & Animation
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  fl_chart: ^0.69.0

  # Local DB
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.4

  # Biometrics & Security
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.3

  # Face Detection
  google_mlkit_face_detection: ^0.11.0

  # Camera & Image
  camera: ^0.10.5+9
  image_picker: ^1.1.2
  image: ^4.2.0

  # HTTP & Networking
  http: ^1.2.2
  dio: ^5.7.0

  # State Management
  provider: ^6.1.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  qr_flutter: ^4.1.0
  permission_handler: ^11.3.1
  geolocator: ^13.0.2
  device_info_plus: ^10.1.0
  connectivity_plus: ^6.1.1
  
  # Exporting
  pdf: ^3.11.1
  excel: ^4.0.6

  # NFC ← FIXED version compatible with Android 14+
  nfc_manager: ^3.5.0
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/animations/
